<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Französisch Trainer - MF 4.4</title>
    <style>
        :root {
            --primary: #3498db;
            --secondary: #2ecc71;
            --danger: #e74c3c;
            --bg: #f4f7f6;
            --text: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 { color: var(--primary); margin-bottom: 10px; }
        
        .mode-selector {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.95); }

        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--secondary); color: white; }

        /* Lernkarten Style */
        .card {
            width: 100%;
            height: 200px;
            perspective: 1000px;
            margin: 20px 0;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border-radius: 10px;
            border: 2px solid #eee;
        }

        .card-front { background: white; }
        .card-back {
            background: var(--primary);
            color: white;
            transform: rotateY(180deg);
        }

        /* Quiz Style */
        #quiz-area { display: none; }
        input[type="text"] {
            width: 80%;
            padding: 12px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 5px;
            margin-bottom: 15px;
            text-align: center;
        }

        .feedback { margin: 15px 0; font-weight: bold; }
        .correct { color: var(--secondary); }
        .wrong { color: var(--danger); }

        .progress {
            font-size: 0.9em;
            color: #7f8c8d;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Französisch MF 4.4</h1>
    <p>Übe deine Vokabeln interaktiv!</p>

    <div class="mode-selector">
        <button class="btn-primary" onclick="showMode('learn')">Lernkarten</button>
        <button class="btn-secondary" onclick="showMode('quiz')">Quiz-Modus</button>
    </div>

    <div id="learn-area">
        <div class="card" id="vocab-card" onclick="this.classList.toggle('flipped')">
            <div class="card-inner">
                <div class="card-front" id="card-q">Wort</div>
                <div class="card-back" id="card-a">Übersetzung</div>
            </div>
        </div>
        <button class="btn-primary" onclick="nextCard()">Nächste Karte</button>
    </div>

    <div id="quiz-area">
        <h2 id="quiz-question">Deutsch?</h2>
        <input type="text" id="quiz-input" placeholder="Französisch eingeben..." autocomplete="off">
        <br>
        <button class="btn-secondary" onclick="checkAnswer()">Prüfen</button>
        <div id="quiz-feedback" class="feedback"></div>
    </div>

    <div class="progress" id="progress-text">Vokabel 1 von X</div>
</div>

<script>
    const vocabulary = [
        { d: "das Zimmer", f: "la chambre" },
        { d: "die Küche", f: "la cuisine" },
        { d: "das Wohnzimmer", f: "le salon" },
        { d: "das Badezimmer", f: "la salle de bains" },
        { d: "die Treppe", f: "l'escalier" },
        { d: "die Tür", f: "la porte" },
        { d: "das Fenster", f: "la fenêtre" },
        { d: "die Dusche", f: "la douche" },
        { d: "das Bett", f: "le lit" },
        { d: "der Schrank", f: "l'armoire" },
        { d: "der Teppich", f: "le tapis" },
        { d: "der Backofen", f: "le four" },
        { d: "der Kühlschrank", f: "le frigo" },
        { d: "der Schlüssel", f: "la clé" },
        { d: "die Zahnbürste", f: "la brosse à dents" },
        { d: "die Taschenlampe", f: "la lampe de poche" },
        { d: "die Flasche", f: "la bouteille" },
        { d: "das Taschentuch", f: "le mouchoir" },
        { d: "der Regenschirm", f: "le parapluie" },
        { d: "das Gehege", f: "l'enclos" },
        { d: "wohnen", f: "habiter" },
        { d: "eintreten", f: "entrer" },
        { d: "hinaufsteigen", f: "monter" },
        { d: "klingeln", f: "sonner" },
        { d: "schliessen", f: "fermer" },
        { d: "verlassen", f: "quitter" },
        { d: "Mist!", f: "Zut!" },
        { d: "Das ist toll!", f: "C'est génial!" },
        { d: "Los geht's!", f: "C'est parti!" }
    ];

    let currentIndex = 0;
    let quizMode = false;

    function showMode(mode) {
        const learn = document.getElementById('learn-area');
        const quiz = document.getElementById('quiz-area');
        if (mode === 'learn') {
            learn.style.display = 'block';
            quiz.style.display = 'none';
            quizMode = false;
        } else {
            learn.style.display = 'none';
            quiz.style.display = 'block';
            quizMode = true;
            document.getElementById('quiz-input').focus();
        }
        updateDisplay();
    }

    function updateDisplay() {
        const item = vocabulary[currentIndex];
        const total = vocabulary.length;
        document.getElementById('progress-text').innerText = `Vokabel ${currentIndex + 1} von ${total}`;
        
        if (!quizMode) {
            document.getElementById('vocab-card').classList.remove('flipped');
            document.getElementById('card-q').innerText = item.d;
            document.getElementById('card-a').innerText = item.f;
        } else {
            document.getElementById('quiz-question').innerText = `Übersetze: ${item.d}`;
            document.getElementById('quiz-input').value = '';
            document.getElementById('quiz-feedback').innerText = '';
        }
    }

    function nextCard() {
        currentIndex = (currentIndex + 1) % vocabulary.length;
        updateDisplay();
    }

    function checkAnswer() {
        const input = document.getElementById('quiz-input').value.trim().toLowerCase();
        const correct = vocabulary[currentIndex].f.toLowerCase();
        const feedback = document.getElementById('quiz-feedback');

        if (input === correct) {
            feedback.innerHTML = `<span class="correct">Richtig!</span>`;
            setTimeout(() => {
                nextCard();
                document.getElementById('quiz-input').focus();
            }, 1000);
        } else {
            feedback.innerHTML = `<span class="wrong">Nicht ganz. Richtig ist: ${vocabulary[currentIndex].f}</span>`;
        }
    }

    // Enter-Taste im Quiz unterstützen
    document.getElementById('quiz-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') checkAnswer();
    });

    // Start-Anzeige
    updateDisplay();
</script>

</body>
</html>
